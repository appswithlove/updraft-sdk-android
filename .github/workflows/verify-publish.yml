name: Verify publish (dry run)

# Manually runs the exact verify step of publish.yml on the same runner,
# without publishing. Use before pushing to production to avoid burning a
# release attempt on an environment failure.
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx3g -Dkotlin.daemon.jvmargs=-Xmx3g
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Verify (published modules, both platforms)
        run: ./gradlew :updraft-sdk:build :updraft-core:testDebugUnitTest :updraft-ui-compose:testDebugUnitTest :updraft-core:iosSimulatorArm64Test :updraft-ui-compose:iosSimulatorArm64Test :updraft-core:assembleUpdraftCoreXCFramework --max-workers=2
